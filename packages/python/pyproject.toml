[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "axllm"
version = "23.0.2"
description = "Generated Ax runtime library"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Ax" }]
dependencies = []
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Typing :: Typed",
]

[project.optional-dependencies]
# In-process QuickJS engine for agent().forward(...): `pip install axllm[runtime-quickjs]`.
# The core wheel stays stdlib-only; this extra enables AxQuickJsCodeRuntime.
runtime-quickjs = ["quickjs>=1.19.4"]
# WebSocket transport for realtime audio chat(): `pip install axllm[realtime]`.
# The core wheel stays stdlib-only; this extra enables the live realtime_chat transport.
realtime = ["websocket-client>=1.7"]

[project.urls]
Homepage = "https://axllm.dev"
Repository = "https://github.com/ax-llm/ax"

[tool.setuptools.packages.find]
include = ["axllm", "axllm.*"]

[tool.setuptools.package-data]
axllm = ["py.typed"]
