name: Publish generated packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Rehearse without uploading anywhere
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  rust-crates-io:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Trusted publishing via GitHub OIDC; a CARGO_REGISTRY_TOKEN secret
      # takes precedence for the first publish before the crate exists.
      - id: oidc
        if: env.DRY_RUN != 'true'
        uses: rust-lang/crates-io-auth-action@v1
        continue-on-error: true
      - name: Publish axllm to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || steps.oidc.outputs.token }}
        run: |
          FLAGS=""
          if [ "$DRY_RUN" = "true" ]; then
            FLAGS="--dry-run"
          fi
          cargo publish $FLAGS --no-verify --manifest-path packages/rust/Cargo.toml

  python-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build packages/python
          python -m twine check packages/python/dist/*
      - name: Publish axllm to PyPI
        if: env.DRY_RUN != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/python/dist
          skip-existing: true

  java-maven-central:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      # Configures ~/.m2/settings.xml with the `central` server (Portal token) and
      # imports the GPG signing key the `release` profile in packages/java/pom.xml uses.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      # Dry run builds + GPG-signs the jars (verify) but stops before upload; a real
      # release runs `deploy`, which the central-publishing plugin uploads and publishes.
      - name: Publish dev.axllm:ax to Maven Central
        working-directory: packages/java
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          GOAL="deploy"
          if [ "$DRY_RUN" = "true" ]; then
            GOAL="verify"
          fi
          mvn -B -ntp -Prelease -DskipTests "$GOAL"
