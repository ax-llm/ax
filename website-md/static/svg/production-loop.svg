<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Production telemetry loop</title>
  <desc id="desc">Ax programs emit traces, usage, errors, and optimizer artifacts around a typed program surface.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .ink { fill: #0a2540; }
    .muted { fill: #61758a; }
    .loop { fill: none; stroke: #9aa8ba; stroke-width: 2.3; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #c8d3df; stroke-width: 1.4; stroke-linecap: round; }
    .blue { fill: #067ab8; }
    .teal { fill: #0a8f7a; }
    .amber { fill: #a97009; }
    .rust { fill: #b34836; }
    .green { fill: #0a8852; }
    .violet { fill: #635bff; }
    .soft-blue { fill: #e7f4ff; }
    .soft-teal { fill: #e7fbf5; }
    .soft-amber { fill: #fff5da; }
    .soft-rust { fill: #fff0eb; }
    .soft-green { fill: #e9fbf2; }
    .soft-violet { fill: #f1efff; }
    .core { font-size: 21px; font-weight: 760; }
    .label { font-size: 13px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f4f7fb; }
      .muted { fill: #aab8cb; }
      .loop { stroke: #78879d; }
      .thin { stroke: #34445c; }
      .soft-blue { fill: #10263a; }
      .soft-teal { fill: #11342e; }
      .soft-amber { fill: #302614; }
      .soft-rust { fill: #351f1b; }
      .soft-green { fill: #123323; }
      .soft-violet { fill: #221f45; }
    }
  </style>
  <defs>
    <marker id="arrow-prod" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#9aa8ba"/>
    </marker>
  </defs>

  <path class="loop" marker-end="url(#arrow-prod)" d="M276 214C316 114 404 78 492 88"/>
  <path class="loop" marker-end="url(#arrow-prod)" d="M536 92C666 116 770 176 780 250"/>
  <path class="loop" marker-end="url(#arrow-prod)" d="M748 290C624 360 410 354 296 282"/>

  <circle class="soft-teal" cx="490" cy="214" r="58"/>
  <circle class="teal" cx="490" cy="214" r="9"/>
  <text class="ink core" x="438" y="209">program</text>
  <text class="label" x="460" y="238" fill="#0a8f7a">typed</text>

  <g>
    <circle class="soft-blue" cx="216" cy="214" r="29"/><circle class="blue" cx="216" cy="214" r="6"/><text class="label" x="118" y="219" fill="#067ab8">request</text>
    <circle class="soft-green" cx="714" cy="106" r="29"/><circle class="green" cx="714" cy="106" r="6"/><text class="label" x="754" y="111" fill="#0a8852">traces</text>
    <circle class="soft-amber" cx="792" cy="252" r="29"/><circle class="amber" cx="792" cy="252" r="6"/><text class="label" x="832" y="257" fill="#a97009">usage</text>
    <circle class="soft-violet" cx="490" cy="348" r="29"/><circle class="violet" cx="490" cy="348" r="6"/><text class="label" x="532" y="353" fill="#635bff">artifacts</text>
    <circle class="soft-rust" cx="224" cy="286" r="29"/><circle class="rust" cx="224" cy="286" r="6"/><text class="label" x="112" y="291" fill="#b34836">errors</text>
  </g>
  <path class="thin" d="M490 272V320M438 238C380 270 322 286 248 286M540 238C616 264 690 260 766 252"/>
</svg>
