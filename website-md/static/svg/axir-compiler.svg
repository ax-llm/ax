<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">AxIR compiler pipeline</title>
  <desc id="desc">TypeScript reference behavior is captured in AxIR, lowered through a core model, emitted as native packages, and verified with conformance fixtures.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .ink { fill: #0a2540; }
    .muted { fill: #61758a; }
    .flow { fill: none; stroke: #9aa8ba; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #c8d3df; stroke-width: 1.4; stroke-linecap: round; }
    .dash { fill: none; stroke: #bcc8d6; stroke-width: 1.4; stroke-dasharray: 5 7; }
    .blue { fill: #067ab8; }
    .teal { fill: #0a8f7a; }
    .amber { fill: #a97009; }
    .rust { fill: #b34836; }
    .green { fill: #0a8852; }
    .violet { fill: #635bff; }
    .soft-blue { fill: #e7f4ff; }
    .soft-teal { fill: #e7fbf5; }
    .soft-amber { fill: #fff5da; }
    .soft-rust { fill: #fff0eb; }
    .soft-green { fill: #e9fbf2; }
    .soft-violet { fill: #f1efff; }
    .big { font-size: 21px; font-weight: 760; }
    .label { font-size: 13px; font-weight: 700; }
    .small { font-size: 10px; font-weight: 620; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 11px; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f4f7fb; }
      .muted { fill: #aab8cb; }
      .flow { stroke: #78879d; }
      .thin { stroke: #34445c; }
      .dash { stroke: #50627b; }
      .soft-blue { fill: #10263a; }
      .soft-teal { fill: #11342e; }
      .soft-amber { fill: #302614; }
      .soft-rust { fill: #351f1b; }
      .soft-green { fill: #123323; }
      .soft-violet { fill: #221f45; }
    }
  </style>
  <defs>
    <marker id="arrow-axir" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#9aa8ba"/>
    </marker>
  </defs>

  <text class="ink big" x="78" y="178">TypeScript</text>
  <text class="mono muted" x="80" y="204">reference</text>
  <path class="flow" marker-end="url(#arrow-axir)" d="M250 190H354"/>

  <g>
    <circle class="soft-teal" cx="398" cy="190" r="40"/>
    <circle class="teal" cx="398" cy="190" r="8"/>
    <text class="label" x="365" y="252" fill="#0a8f7a">AxIR</text>
  </g>
  <path class="flow" marker-end="url(#arrow-axir)" d="M440 190H546"/>

  <g>
    <circle class="soft-amber" cx="588" cy="190" r="36"/>
    <circle class="amber" cx="588" cy="190" r="8"/>
    <text class="label" x="564" y="252" fill="#a97009">Core</text>
  </g>
  <path class="flow" marker-end="url(#arrow-axir)" d="M626 190H728"/>

  <g>
    <circle class="soft-blue" cx="768" cy="190" r="36"/>
    <circle class="blue" cx="768" cy="190" r="8"/>
    <text class="label" x="746" y="252" fill="#067ab8">emit</text>
  </g>

  <path class="dash" d="M768 230V282"/>
  <path class="thin" d="M768 282C698 292 638 312 590 330M768 282C718 296 690 310 664 330M768 282C768 298 752 312 732 330M768 282C810 296 844 312 872 330M768 282C840 292 888 312 922 330"/>
  <g>
    <circle class="soft-blue" cx="590" cy="330" r="22"/><circle class="blue" cx="590" cy="330" r="5"/><text class="small" x="568" y="370" fill="#067ab8">Python</text>
    <circle class="soft-amber" cx="664" cy="330" r="22"/><circle class="amber" cx="664" cy="330" r="5"/><text class="small" x="650" y="370" fill="#a97009">Java</text>
    <circle class="soft-rust" cx="732" cy="330" r="22"/><circle class="rust" cx="732" cy="330" r="5"/><text class="small" x="722" y="370" fill="#b34836">C++</text>
    <circle class="soft-green" cx="872" cy="330" r="22"/><circle class="green" cx="872" cy="330" r="5"/><text class="small" x="864" y="370" fill="#0a8852">Go</text>
    <circle class="soft-violet" cx="922" cy="330" r="22"/><circle class="violet" cx="922" cy="330" r="5"/><text class="small" x="910" y="370" fill="#635bff">Rust</text>
  </g>

  <path class="flow" marker-end="url(#arrow-axir)" d="M590 330C430 354 270 328 148 282"/>
  <circle class="soft-blue" cx="120" cy="270" r="24"/>
  <circle class="blue" cx="120" cy="270" r="6"/>
  <text class="label" x="74" y="322" fill="#067ab8">verify</text>
</svg>
