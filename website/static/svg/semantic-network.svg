<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Ax semantic network</title>
  <desc id="desc">A signature sits at the center of Ax and connects to AI models, generation, tools, agents, runtime state, schemas, and telemetry.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .ink { fill: #0a2540; }
    .link { fill: none; stroke: #bcc8d6; stroke-width: 1.8; stroke-linecap: round; }
    .blue { fill: #067ab8; }
    .teal { fill: #0a8f7a; }
    .amber { fill: #a97009; }
    .rust { fill: #b34836; }
    .green { fill: #0a8852; }
    .violet { fill: #635bff; }
    .soft-blue { fill: #e7f4ff; }
    .soft-teal { fill: #e7fbf5; }
    .soft-amber { fill: #fff5da; }
    .soft-rust { fill: #fff0eb; }
    .soft-green { fill: #e9fbf2; }
    .soft-violet { fill: #f1efff; }
    .core { font-size: 22px; font-weight: 760; }
    .label { font-size: 13px; font-weight: 700; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f4f7fb; }
      .link { stroke: #465873; }
      .soft-blue { fill: #10263a; }
      .soft-teal { fill: #11342e; }
      .soft-amber { fill: #302614; }
      .soft-rust { fill: #351f1b; }
      .soft-green { fill: #123323; }
      .soft-violet { fill: #221f45; }
    }
  </style>

  <g class="link">
    <path d="M490 212C384 112 278 94 190 118"/>
    <path d="M490 212C372 176 278 180 178 212"/>
    <path d="M490 212C384 306 284 324 198 300"/>
    <path d="M490 212C474 112 518 76 612 90"/>
    <path d="M490 212C600 106 710 90 800 118"/>
    <path d="M490 212C610 176 708 180 810 212"/>
    <path d="M490 212C604 306 710 324 800 300"/>
    <path d="M490 212C496 300 468 342 406 350"/>
  </g>

  <circle class="soft-teal" cx="490" cy="212" r="60"/>
  <circle class="teal" cx="490" cy="212" r="10"/>
  <text class="ink core" x="442" y="207">signature</text>
  <text class="label" x="468" y="235" fill="#0a8f7a">contract</text>

  <g>
    <circle class="soft-teal" cx="190" cy="118" r="26"/><circle class="teal" cx="190" cy="118" r="6"/><text class="label" x="230" y="123" fill="#0a8f7a">AI</text>
    <circle class="soft-rust" cx="178" cy="212" r="26"/><circle class="rust" cx="178" cy="212" r="6"/><text class="label" x="218" y="217" fill="#b34836">Gen</text>
    <circle class="soft-amber" cx="198" cy="300" r="26"/><circle class="amber" cx="198" cy="300" r="6"/><text class="label" x="238" y="305" fill="#a97009">examples</text>
    <circle class="soft-blue" cx="612" cy="90" r="26"/><circle class="blue" cx="612" cy="90" r="6"/><text class="label" x="652" y="95" fill="#067ab8">tools</text>
    <circle class="soft-green" cx="800" cy="118" r="26"/><circle class="green" cx="800" cy="118" r="6"/><text class="label" x="840" y="123" fill="#0a8852">agent</text>
    <circle class="soft-blue" cx="810" cy="212" r="26"/><circle class="blue" cx="810" cy="212" r="6"/><text class="label" x="850" y="217" fill="#067ab8">runtime</text>
    <circle class="soft-violet" cx="800" cy="300" r="26"/><circle class="violet" cx="800" cy="300" r="6"/><text class="label" x="840" y="305" fill="#635bff">telemetry</text>
    <circle class="soft-teal" cx="406" cy="350" r="24"/><circle class="teal" cx="406" cy="350" r="6"/><text class="label" x="446" y="355" fill="#0a8f7a">schema</text>
  </g>
</svg>
