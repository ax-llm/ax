<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">MCP tool bridge</title>
  <desc id="desc">MCP servers expose tools, resources, and prompts that Ax can adapt into functions for ax generation and agents.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .ink { fill: #0a2540; }
    .muted { fill: #61758a; }
    .flow { fill: none; stroke: #9aa8ba; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .thin { fill: none; stroke: #c8d3df; stroke-width: 1.4; stroke-linecap: round; }
    .blue { fill: #067ab8; }
    .teal { fill: #0a8f7a; }
    .amber { fill: #a97009; }
    .rust { fill: #b34836; }
    .green { fill: #0a8852; }
    .soft-blue { fill: #e7f4ff; }
    .soft-teal { fill: #e7fbf5; }
    .soft-amber { fill: #fff5da; }
    .soft-rust { fill: #fff0eb; }
    .soft-green { fill: #e9fbf2; }
    .big { font-size: 21px; font-weight: 760; }
    .label { font-size: 13px; font-weight: 700; }
    .small { font-size: 10px; font-weight: 620; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #f4f7fb; }
      .muted { fill: #aab8cb; }
      .flow { stroke: #78879d; }
      .thin { stroke: #34445c; }
      .soft-blue { fill: #10263a; }
      .soft-teal { fill: #11342e; }
      .soft-amber { fill: #302614; }
      .soft-rust { fill: #351f1b; }
      .soft-green { fill: #123323; }
    }
  </style>
  <defs>
    <marker id="arrow-mcp" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#9aa8ba"/>
    </marker>
  </defs>

  <text class="ink big" x="88" y="210">MCP</text>
  <path class="flow" marker-end="url(#arrow-mcp)" d="M232 214H374"/>

  <g>
    <circle class="soft-teal" cx="420" cy="122" r="28"/><circle class="teal" cx="420" cy="122" r="6"/><text class="label" x="462" y="127" fill="#0a8f7a">tools</text>
    <circle class="soft-blue" cx="420" cy="214" r="28"/><circle class="blue" cx="420" cy="214" r="6"/><text class="label" x="462" y="219" fill="#067ab8">resources</text>
    <circle class="soft-amber" cx="420" cy="306" r="28"/><circle class="amber" cx="420" cy="306" r="6"/><text class="label" x="462" y="311" fill="#a97009">prompts</text>
  </g>

  <path class="flow" marker-end="url(#arrow-mcp)" d="M534 122C592 138 634 166 668 196M548 214H668M534 306C594 286 634 258 668 230"/>
  <circle class="soft-rust" cx="708" cy="214" r="44"/>
  <circle class="rust" cx="708" cy="214" r="8"/>
  <text class="label" x="660" y="288" fill="#b34836">MCP client</text>

  <path class="thin" d="M750 188C806 150 834 128 866 120M750 238C806 276 834 296 866 306"/>
  <circle class="soft-blue" cx="866" cy="120" r="26"/><circle class="blue" cx="866" cy="120" r="6"/><text class="label" x="836" y="166" fill="#067ab8">ax()</text>
  <circle class="soft-green" cx="866" cy="306" r="26"/><circle class="green" cx="866" cy="306" r="6"/><text class="label" x="824" y="352" fill="#0a8852">agent()</text>
</svg>
