languages:
  - id: typescript
    label: TypeScript
    shortLabel: TS
    codeLang: typescript
    command: npm install @ax-llm/ax
    statusLabel: on npm
    skillsCommand: npx skills add https://ax-llm.github.io/ax/typescript/ --skill '*'
    classifier:
      filename: classify.ts
      runtimeLabel: ax()
      status: Type-safe, validated, auto-retried on failure
      output: |
        {
          "sentiment": "positive"
        }
      code: |
        import { ai, ax } from "@ax-llm/ax";

        const llm = ai({ name: "openai" });
        const classify = ax(
          "review:string -> sentiment:class \"positive, negative, neutral\""
        );

        const result = await classify.forward(llm, {
          review: "This product is amazing!",
        });
    audio:
      filename: audio.ts
      runtimeLabel: speech:audio
      code: |
        import { ai, ax } from "@ax-llm/ax";

        const llm = ai({ name: "openai" });
        const narrator = ax("article:string -> speech:audio, summary:string");

        const result = await narrator.forward(
          llm,
          { article },
          { speech: { speak: { voice: "alloy", format: "mp3" } } }
        );
    signatureString:
      filename: signatures.ts
      code: |
        const extract = ax(
          "doc:string -> names:string[], dates:date[], amounts:number[]"
        );
    signatureFluent:
      filename: fields.ts
      code: |
        const sig = f()
          .input("document", f.string().min(10))
          .output("summary", f.string().max(500))
          .output("tags", f.string().array())
          .build();
    signatureSchema:
      filename: schema.ts
      code: |
        const sig = f()
          .output(z.object({
            summary: z.string(),
            score: z.number().min(1).max(10),
          }))
          .build();
    agent:
      filename: researcher.ts
      runtimeLabel: JS runtime session
      code: |
        import { agent, ai, fn } from "@ax-llm/ax";

        const llm = ai({ name: "openai" });
        const research = agent({
          name: "researcher",
          signature: "question:string -> answer:string, sources:string[]",
          functions: [
            fn({
              name: "search",
              description: "Search internal docs",
              parameters: "query:string -> results:string[]",
              handler: searchDocs,
            }),
          ],
          contextFields: ["largeDocument"],
        });

        const result = await research.forward(llm, {
          question: "What changed in the release?",
        });
    provider:
      filename: providers.ts
      code: |
        const openai = ai({ name: "openai" });
        const claude = ai({ name: "anthropic" });
        const local = ai({
          name: "openai",
          config: { baseURL: "http://localhost:11434/v1" },
        });
    graphjin:
      filename: ax-agent.ts
      code: |
        import { AxMCPClient, AxMCPHTTPSSETransport, agent } from "@ax-llm/ax";

        const transport = new AxMCPHTTPSSETransport(
          "http://localhost:8080/api/v1/mcp"
        );
        const mcp = new AxMCPClient(transport);
        await mcp.init();

        const dataAnalyst = agent({
          name: "data-analyst",
          signature: "question:string -> answer:string",
          functions: mcp.toFunction(),
        });
    patterns:
      classification: ax("text:string -> category:class \"spam, ham, promo\"")
      extraction: ax("document:string -> names:string[], dates:date[]")
      qa: ax("context:string, question:string -> answer:string")
      multimodal: ax("photo:image, question:string -> answer:string")
      validation: ax("email:string, score:number -> valid:boolean")
      streaming: ax("topic:string -> chunk:string")
      translation: ax("text:string, targetLanguage:string -> translation:string")
      workflows: ax("doc:string -> summary:string, keyPoints:string[]")
  - id: python
    label: Python
    shortLabel: Python
    codeLang: python
    command: pip install "axllm @ git+https://github.com/ax-llm/ax#subdirectory=packages/python"
    statusLabel: in repo · PyPI soon
    skillsCommand: npx skills add https://ax-llm.github.io/ax/python/ --skill '*'
    classifier:
      filename: classify.py
      runtimeLabel: ax()
      status: Validated Python dicts from the same Ax signature
      output: |
        {
          "sentiment": "positive"
        }
      code: |
        from axllm import ai, ax

        llm = ai("openai")
        classify = ax(
            'review:string -> sentiment:class "positive, negative, neutral"'
        )

        result = classify.forward(llm, {
            "review": "This product is amazing!"
        })
    audio:
      filename: audio.py
      runtimeLabel: speech:audio
      code: |
        from axllm import ai, ax

        llm = ai("openai")
        narrator = ax("article:string -> speech:audio, summary:string")

        result = narrator.forward(
            llm,
            {"article": article},
            {"speech": {"speak": {"voice": "alloy", "format": "mp3"}}},
        )
    signatureString:
      filename: signatures.py
      code: |
        extract = ax(
            "doc:string -> names:string[], dates:date[], amounts:number[]"
        )
    signatureFluent:
      filename: fields.py
      code: |
        analyze = ax(
            "document:string -> summary:string, tags:string[]"
        )
        result = analyze.forward(llm, {"document": text})
    signatureSchema:
      filename: schema.py
      code: |
        sig = s(
            "document:string -> summary:string, score:number"
        )
        schema = sig.to_json_schema("outputs")
    agent:
      filename: researcher.py
      runtimeLabel: Python host session
      code: |
        from axllm import agent, ai

        llm = ai("openai")
        research = agent(
            "question:string, largeDocument:string -> "
            "answer:string, sources:string[]",
            {
                "functions": [search_docs],
                "contextFields": ["largeDocument"],
            },
        )

        result = research.forward(llm, {
            "question": "What changed in the release?",
            "largeDocument": doc,
        })
    provider:
      filename: providers.py
      code: |
        openai = ai("openai")
        claude = ai("anthropic")
        local = ai("openai", {
            "baseURL": "http://localhost:11434/v1"
        })
    graphjin:
      filename: ax_agent.py
      code: |
        from axllm import agent
        from axllm.mcp import MCPClient, HTTPSSETransport

        transport = HTTPSSETransport(
            "http://localhost:8080/api/v1/mcp"
        )
        mcp = MCPClient(transport)
        mcp.init()

        data_analyst = agent(
            "question:string -> answer:string",
            {"functions": mcp.to_functions()},
        )
    patterns:
      classification: ax('text:string -> category:class "spam, ham, promo"')
      extraction: ax("document:string -> names:string[], dates:date[]")
      qa: ax("context:string, question:string -> answer:string")
      multimodal: ax("photo:image, question:string -> answer:string")
      validation: ax("email:string, score:number -> valid:boolean")
      streaming: ax("topic:string -> chunk:string")
      translation: ax("text:string, targetLanguage:string -> translation:string")
      workflows: ax("doc:string -> summary:string, keyPoints:string[]")
