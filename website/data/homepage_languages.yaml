        use serde_json::json;

        let mut llm = ai("google-gemini", json!({}))?;
        let mut auditor = agent_with_options(
          "ledger:json[], question:string -> total:number, flagged:string[]",
          json!({ "contextFields": ["ledger"] }), // rows stay in the runtime
        )?;

        let result = auditor.forward(&mut llm, json!({
          "ledger": ledger, // never enters the prompt
