{{ $name := .Get 0 }}
{{ $tone := .Get 1 | default "icon-blue" }}
<span class="home-card-icon {{ $tone }}" aria-hidden="true">
  <svg viewBox="0 0 24 24" focusable="false">
    {{ if eq $name "activity" }}
      <path d="M3 12h4l3-8 4 16 3-8h4"/>
    {{ else if eq $name "bar-chart" }}
      <path d="M4 20V4"/><path d="M4 20h16"/><path d="M8 16V9"/><path d="M12 16V6"/><path d="M16 16v-4"/>
    {{ else if eq $name "zap" }}
      <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8z"/>
    {{ else if eq $name "dollar" }}
      <path d="M12 2v20"/><path d="M16 6H9L7 8v2l2 2h6l2 2v2l-2 2H7"/>
    {{ else if eq $name "globe" }}
      <circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.3 2.5 3.4 5.5 3.4 9S14.3 18.5 12 21c-2.3-2.5-3.4-5.5-3.4-9S9.7 5.5 12 3z"/>
    {{ else if eq $name "shield" }}
      <path d="M12 3 5 6v5c0 4.4 2.8 8.4 7 10 4.2-1.6 7-5.6 7-10V6l-7-3z"/>
    {{ else if eq $name "tags" }}
      <path d="M20 10 12 2H5v7l8 8 7-7z"/><path d="M7.5 6.5h.01"/><path d="m14 19 1 1 7-7-1-1"/>
    {{ else if eq $name "file-text" }}
      <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7l-5-5z"/><path d="M14 2v5h5"/><path d="M8 13h8"/><path d="M8 17h6"/>
    {{ else if eq $name "message-circle" }}
      <path d="M5 6h14v10H9l-4 3V6z"/>
    {{ else if eq $name "image" }}
      <rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="m21 15-4.5-4.5L7 20"/>
    {{ else if eq $name "languages" }}
      <path d="M5 4h8"/><path d="M9 4v3"/><path d="M4 8h10"/><path d="M7 8c.7 2.2 2.7 4.2 5 5.2"/><path d="M12 8c-.7 2.2-2.7 4.2-5 5.2"/><path d="M14 20l3-7 3 7"/><path d="M15.2 17h3.6"/>
    {{ else if eq $name "list-checks" }}
      <path d="m4 6 1.5 1.5L8 5"/><path d="M11 6h9"/><path d="m4 12 1.5 1.5L8 11"/><path d="M11 12h9"/><path d="m4 18 1.5 1.5L8 17"/><path d="M11 18h9"/>
    {{ else if eq $name "bot" }}
      <rect x="5" y="8" width="14" height="10" rx="2"/><path d="M12 8V4"/><path d="M8.5 13h.01"/><path d="M15.5 13h.01"/><path d="M9 18v2"/><path d="M15 18v2"/>
    {{ else if eq $name "brain" }}
      <path d="M9 5a3 3 0 0 0-3 3c-1.7.3-3 1.8-3 3.6 0 1.5.9 2.8 2.2 3.4A3.5 3.5 0 0 0 12 16.2V7.8A3.5 3.5 0 0 0 9 5z"/><path d="M15 5a3 3 0 0 1 3 3c1.7.3 3 1.8 3 3.6 0 1.5-.9 2.8-2.2 3.4A3.5 3.5 0 0 1 12 16.2"/>
    {{ else }}
      <circle cx="12" cy="12" r="8"/><path d="M12 8v5"/><path d="M12 17h.01"/>
    {{ end }}
  </svg>
</span>
